<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Life Ledger</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --sage:#7C9E8F;--sage-light:#EAF2EE;--sage-mid:#B8D4C8;
  --sand:#F5F0E8;--sand-dark:#E8E0D0;
  --warm:#C4956A;--warm-light:#F5E8D8;
  --text:#2C3830;--text-mid:#5A6B62;--text-soft:#8A9E94;
  --white:#FDFCF9;--radius:14px;
}
body{font-family:'DM Sans',sans-serif;background:var(--sand);color:var(--text);min-height:100vh;}
.app{max-width:520px;margin:0 auto;padding:1.5rem 1rem 5rem;}
.header{text-align:center;margin-bottom:1.8rem;padding-top:.5rem;}
.header-title{font-family:'DM Serif Display',serif;font-style:italic;font-size:30px;color:var(--text);}
.header-month{font-size:13px;color:var(--text-soft);margin-top:4px;font-weight:300;letter-spacing:.5px;}
.header-total{margin-top:12px;background:var(--white);border-radius:12px;padding:10px 24px;display:inline-block;border:1px solid var(--sand-dark);}
.total-label{font-size:11px;color:var(--text-soft);text-transform:uppercase;letter-spacing:1px;}
.total-amt{font-size:24px;font-weight:500;color:var(--sage);}
.sync-status{font-size:11px;margin-top:8px;color:var(--text-soft);}
.sync-status.syncing{color:var(--warm);}
.sync-status.synced{color:var(--sage);}
.sync-status.error{color:#c0392b;}

/* 3-across grid */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px;}
.tile{background:var(--white);border-radius:var(--radius);padding:.85rem .8rem;cursor:pointer;border:1px solid transparent;transition:all .2s;position:relative;overflow:hidden;}
.tile:active{transform:scale(0.97);}
.tile:hover{border-color:var(--sage-mid);transform:translateY(-1px);}
.tile::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--radius) var(--radius) 0 0;}
.tile.sage::before{background:var(--sage);}
.tile.warm::before{background:var(--warm);}
.tile.soft::before{background:var(--sage-mid);}
.tile-emoji{font-size:18px;margin-bottom:5px;display:block;}
.tile-name{font-size:11px;font-weight:500;color:var(--text-mid);margin-bottom:5px;line-height:1.3;}
.tile-amt{font-size:17px;font-weight:500;color:var(--text);}

/* Panel */
.panel{display:none;position:fixed;inset:0;background:rgba(44,56,48,.4);z-index:100;align-items:flex-end;justify-content:center;}
.panel.open{display:flex;}
.panel-inner{background:var(--white);border-radius:24px 24px 0 0;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;padding:1.5rem 1.25rem 2.5rem;}
.panel-handle{width:36px;height:4px;background:var(--sand-dark);border-radius:2px;margin:0 auto 1.3rem;}
.panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.panel-title{font-family:'DM Serif Display',serif;font-size:22px;color:var(--text);}
.panel-total{font-size:17px;font-weight:500;color:var(--sage);}
.panel-close{font-size:18px;color:var(--text-soft);cursor:pointer;background:var(--sand);border:none;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* Subcategory totals */
.sub-totals{background:var(--sage-light);border-radius:12px;padding:.85rem 1rem;margin-bottom:1rem;}
.sub-totals-title{font-size:11px;color:var(--text-soft);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.sub-total-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--sage-mid);}
.sub-total-row:last-child{border-bottom:none;}
.sub-total-name{font-size:13px;color:var(--text-mid);}
.sub-total-amt{font-size:13px;font-weight:500;color:var(--sage);}
.sub-total-none{font-size:12px;color:var(--text-soft);font-style:italic;}

/* Subtabs */
.subtabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1rem;}
.subtab{font-size:12px;padding:5px 13px;border-radius:20px;border:1px solid var(--sand-dark);background:var(--white);color:var(--text-mid);cursor:pointer;transition:all .15s;}
.subtab.active{background:var(--sage);border-color:var(--sage);color:white;}
.subtab.manage{background:var(--sand);color:var(--text-soft);border-style:dashed;}

/* Entries */
.entries{margin-bottom:1rem;}
.entry{display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:1px solid var(--sand-dark);}
.entry-dot{width:8px;height:8px;border-radius:50%;background:var(--sage-mid);flex-shrink:0;margin-top:5px;}
.entry-info{flex:1;min-width:0;}
.entry-top{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.entry-date{font-size:13px;color:var(--text);font-weight:500;}
.entry-sub{color:var(--sage);font-size:11px;margin-left:4px;}
.entry-amt{font-size:14px;font-weight:500;color:var(--text);white-space:nowrap;}
.entry-note-text{font-size:12px;color:var(--text-mid);margin-top:5px;font-style:italic;background:var(--sage-light);padding:4px 9px;border-radius:7px;display:inline-block;line-height:1.5;}
.entry-actions{display:flex;gap:2px;flex-shrink:0;}
.entry-btn{font-size:13px;color:var(--text-soft);cursor:pointer;background:none;border:none;padding:2px 5px;border-radius:6px;line-height:1;}
.entry-btn.edit:hover{background:var(--sage-light);color:var(--sage);}
.entry-btn.del:hover{background:#fde8e8;color:#b00;}
.no-entries{text-align:center;padding:2rem 1rem;color:var(--text-soft);font-size:14px;line-height:1.6;}

/* Add form */
.add-form{background:var(--sand);border-radius:14px;padding:1.1rem;margin-top:.5rem;}
.add-form-title{font-size:11px;color:var(--text-soft);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
.form-label{font-size:11px;color:var(--text-soft);margin-bottom:4px;display:block;letter-spacing:.3px;}
.form-row{display:flex;gap:8px;margin-bottom:10px;}
.form-col{display:flex;flex-direction:column;flex:1;}
.form-input{width:100%;padding:10px 12px;border:1px solid var(--sand-dark);border-radius:10px;font-size:14px;font-family:'DM Sans',sans-serif;background:var(--white);color:var(--text);outline:none;}
.form-input:focus{border-color:var(--sage);}
.form-select{width:100%;padding:10px 12px;border:1px solid var(--sand-dark);border-radius:10px;font-size:14px;font-family:'DM Sans',sans-serif;background:var(--white);color:var(--text);outline:none;}
.form-select:focus{border-color:var(--sage);}
.form-note{width:100%;padding:10px 12px;border:1px solid var(--sand-dark);border-radius:10px;font-size:13px;font-family:'DM Sans',sans-serif;background:var(--white);color:var(--text);outline:none;resize:none;line-height:1.5;}
.form-note:focus{border-color:var(--sage);}
.form-note::placeholder{color:var(--text-soft);font-style:italic;}
.btn-add{width:100%;background:var(--sage);color:white;border:none;border-radius:10px;padding:12px;font-size:15px;font-family:'DM Sans',sans-serif;cursor:pointer;font-weight:500;margin-top:4px;}
.btn-add:hover{background:#6a8e7f;}
.btn-add.editing{background:var(--warm);}
.btn-cancel{width:100%;background:var(--sand);color:var(--text-mid);border:1px solid var(--sand-dark);border-radius:10px;padding:10px;font-size:14px;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:6px;}
.btn-preset{width:100%;background:var(--sage-light);color:var(--sage);border:1px solid var(--sage-mid);border-radius:10px;padding:10px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;font-weight:500;margin-bottom:10px;}
.note-hint{font-size:11px;color:var(--text-soft);font-style:italic;}

/* Manage subs */
.manage-subs{background:var(--sand);border-radius:14px;padding:1rem;margin-bottom:1rem;}
.manage-subs-title{font-size:11px;color:var(--text-soft);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
.sub-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--sand-dark);}
.sub-item:last-of-type{border-bottom:none;}
.sub-item-name{font-size:13px;color:var(--text);}
.sub-del{font-size:13px;color:var(--text-soft);cursor:pointer;background:none;border:none;padding:2px 8px;border-radius:6px;}
.sub-del:hover{background:#fde8e8;color:#b00;}
.add-sub-row{display:flex;gap:8px;margin-top:10px;}

/* Loading */
.loading-overlay{position:fixed;inset:0;background:rgba(245,240,232,0.9);z-index:200;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
.loading-text{font-size:14px;color:var(--text-mid);}
.spinner{width:32px;height:32px;border:3px solid var(--sage-mid);border-top-color:var(--sage);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Loading your Life Ledger... 🌿</div>
</div>

<div class="app">
  <div class="header">
    <div class="header-title">Life Ledger</div>
    <div class="header-month" id="cur-month"></div>
    <div class="header-total">
      <div class="total-label">total this month</div>
      <div class="total-amt" id="grand-total">$0.00</div>
    </div>
    <div class="sync-status" id="sync-status">loading entries...</div>
  </div>
  <div id="tiles-container"></div>
</div>

<div class="panel" id="panel" onclick="handlePanelClick(event)">
  <div class="panel-inner">
    <div class="panel-handle"></div>
    <div class="panel-header">
      <div class="panel-title" id="panel-title"></div>
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="panel-total" id="panel-total"></div>
        <button class="panel-close" onclick="closePanel()">✕</button>
      </div>
    </div>
    <div id="sub-totals-wrap"></div>
    <div id="panel-subtabs" class="subtabs"></div>
    <div id="manage-subs-wrap"></div>
    <div class="entries" id="panel-entries"></div>
    <div class="add-form" id="add-form">
      <div class="add-form-title" id="form-title">add entry</div>
      <div id="preset-btn-wrap"></div>
      <div class="form-row">
        <div class="form-col">
          <label class="form-label">amount</label>
          <input class="form-input" id="inp-amt" type="number" placeholder="$0.00" step="0.01" inputmode="decimal" />
        </div>
        <div class="form-col">
          <label class="form-label">date</label>
          <input class="form-input" id="inp-date" type="date" />
        </div>
      </div>
      <div id="sub-select-row" style="display:none;margin-bottom:10px;">
        <label class="form-label">subcategory</label>
        <select class="form-select" id="inp-sub"></select>
      </div>
      <div style="margin-bottom:10px;">
        <label class="form-label">note <span class="note-hint">(optional — only shows when filled in)</span></label>
        <textarea class="form-note" id="inp-note" rows="2" placeholder="e.g. insurance didn't cover · tax deductible · long drive to Tampa..."></textarea>
      </div>
      <button class="btn-add" id="btn-submit" onclick="submitEntry()">+ add entry</button>
      <button class="btn-cancel" id="btn-cancel" style="display:none;" onclick="cancelEdit()">cancel</button>
    </div>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyUQJwK-7tREhjitsdZ_xou51YB0PMHf6EE2PvyvP8MVDk7YGzJihtwUiq12cQL0bw9/exec';

const DEFAULT_CATS = [
  {id:'bodycraft',     name:'Bodycraft & Soul',  emoji:'✨', color:'sage', subs:[]},
  {id:'expansion',     name:'Expansion',          emoji:'🌱', color:'sage', subs:[]},
  {id:'ppc',           name:'PPC',                emoji:'💼', color:'warm', subs:['','Treats/Supplies','Marketing','Office/Admin','Client Meals','Client Gifts','Apparel']},
  {id:'subscriptions', name:'Subscriptions',      emoji:'🔄', color:'soft', subs:['','Gaia','Headway','Perplexity','AI Advantage','Pandora','iCloud','Amazon','Grammarly','LFA']},
  {id:'expenses',      name:'Expenses',            emoji:'🛍️', color:'warm', subs:['','Groceries','Events','Dining Out','Amazon','Travel','Airbnb/Hotel']},
  {id:'sasha',         name:'Sasha',              emoji:'🚗', color:'sage', subs:['','Gas','Wash','Repairs']},
  {id:'ssi',           name:'SSI',                emoji:'🏦', color:'soft', subs:[]},
  {id:'tiro',          name:'Tiro',               emoji:'📋', color:'soft', subs:[]},
  {id:'utilities',     name:'Utilities',          emoji:'💡', color:'sage', subs:[]},
  {id:'cell',          name:'Cell',               emoji:'📱', color:'soft', subs:[], preset:27.04},
  {id:'rent',          name:'Rent',               emoji:'🏠', color:'warm', subs:[]},
  {id:'renters',       name:'Renters Insurance',  emoji:'🛡️', color:'soft', subs:[]},
  {id:'statefarm',     name:'State Farm',         emoji:'🔒', color:'soft', subs:[]},
  {id:'wifi',          name:'Wifi',               emoji:'📶', color:'sage', subs:[]},
  {id:'dental',        name:'Dental',             emoji:'🦷', color:'warm', subs:[]},
];

let CATS = [];
let entries = [];
let aId = null, aSub = null;
let editingIdx = null;
let managingSubs = false;

function loadCats() {
  try {
    const saved = localStorage.getItem('ll_cats');
    CATS = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULT_CATS));
  } catch(e) { CATS = JSON.parse(JSON.stringify(DEFAULT_CATS)); }
}
function saveCats() { localStorage.setItem('ll_cats', JSON.stringify(CATS)); }

function setSyncStatus(msg, type) {
  const el = document.getElementById('sync-status');
  el.textContent = msg;
  el.className = 'sync-status ' + (type||'');
}

async function loadEntries() {
  try {
    setSyncStatus('syncing...','syncing');
    const res = await fetch(SCRIPT_URL);
    const data = await res.json();
    if (data.status === 'success') {
      entries = data.entries.map(e => ({...e, amount: parseFloat(e.amount)||0}));
      localStorage.setItem('ll_entries', JSON.stringify(entries));
      setSyncStatus('synced with Google Drive ✓','synced');
    }
  } catch(e) {
    const cached = localStorage.getItem('ll_entries');
    if (cached) { entries = JSON.parse(cached); setSyncStatus('offline — showing cached data','error'); }
    else { entries = []; setSyncStatus('could not connect','error'); }
  }
  document.getElementById('loading').style.display = 'none';
  renderTiles();
}

async function syncAdd(entry) {
  try {
    setSyncStatus('saving...','syncing');
    await fetch(SCRIPT_URL, {method:'POST', body:JSON.stringify({action:'addEntry',...entry})});
    setSyncStatus('synced with Google Drive ✓','synced');
  } catch(e) { setSyncStatus('saved locally only','error'); }
}

async function syncDelete(entry) {
  try { await fetch(SCRIPT_URL, {method:'POST', body:JSON.stringify({action:'deleteEntry',...entry})}); } catch(e) {}
}

function moEntries(id) {
  const n = new Date(), mo = n.getMonth(), yr = n.getFullYear();
  return entries.filter(e => {
    if (e.category !== id) return false;
    const d = new Date(e.date+'T12:00:00');
    return d.getMonth()===mo && d.getFullYear()===yr;
  });
}

function catTot(id) { return moEntries(id).reduce((s,e)=>s+e.amount,0); }
function grandTot() { return CATS.reduce((s,c)=>s+catTot(c.id),0); }
function fmt(n) { return '$'+n.toFixed(2); }

function renderTiles() {
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('cur-month').textContent = months[new Date().getMonth()]+' '+new Date().getFullYear();
  document.getElementById('grand-total').textContent = fmt(grandTot());
  let html = '<div class="grid">';
  CATS.forEach((c,i) => {
    if (i > 0 && i % 3 === 0) html += '</div><div class="grid">';
    html += tHTML(c);
  });
  html += '</div>';
  document.getElementById('tiles-container').innerHTML = html;
  document.querySelectorAll('.tile').forEach(t => t.addEventListener('click', ()=>openPanel(t.dataset.id)));
}

function tHTML(c) {
  const tot = catTot(c.id);
  return `<div class="tile ${c.color}" data-id="${c.id}">
    <span class="tile-emoji">${c.emoji}</span>
    <div class="tile-name">${c.name}</div>
    <div class="tile-amt">${fmt(tot)}</div>
  </div>`;
}

function openPanel(id) {
  aId=id; aSub=null; editingIdx=null; managingSubs=false;
  const c = CATS.find(x=>x.id===id);
  document.getElementById('panel-title').textContent = c.emoji+' '+c.name;
  document.getElementById('panel').classList.add('open');
  document.getElementById('inp-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('inp-amt').value = '';
  document.getElementById('inp-note').value = '';
  document.getElementById('form-title').textContent = 'add entry';
  document.getElementById('btn-submit').textContent = '+ add entry';
  document.getElementById('btn-submit').className = 'btn-add';
  document.getElementById('btn-cancel').style.display = 'none';
  document.getElementById('preset-btn-wrap').innerHTML = c.preset
    ? `<button class="btn-preset" onclick="addPreset()">+ add $${c.preset.toFixed(2)} (monthly)</button>` : '';
  if (c.subs.length) {
    document.getElementById('sub-select-row').style.display = 'block';
    document.getElementById('inp-sub').innerHTML = c.subs.map(s=>`<option value="${s}">${s}</option>`).join('');
  } else {
    document.getElementById('sub-select-row').style.display = 'none';
  }
  renderSubTotals(c);
  renderSubtabs(c);
  renderManageSubs(false);
  renderEntries();
}

function renderSubTotals(c) {
  const wrap = document.getElementById('sub-totals-wrap');
  const namedSubs = c.subs.filter(s=>s!=='');
  if (!namedSubs.length) { wrap.innerHTML=''; return; }
  const mo = new Date().getMonth(), yr = new Date().getFullYear();
  const catEntries = entries.filter(e => {
    if (e.category!==c.id) return false;
    const d = new Date(e.date+'T12:00:00');
    return d.getMonth()===mo && d.getFullYear()===yr;
  });
  let hasAny = false;
  let rows = namedSubs.map(s => {
    const tot = catEntries.filter(e=>e.subcategory===s).reduce((sum,e)=>sum+e.amount,0);
    if (tot > 0) hasAny = true;
    return {s, tot};
  });
  let h = `<div class="sub-totals"><div class="sub-totals-title">subcategory totals</div>`;
  if (!hasAny) {
    h += `<div class="sub-total-none">no entries yet this month</div>`;
  } else {
    rows.forEach(r => {
      if (r.tot > 0) h += `<div class="sub-total-row"><span class="sub-total-name">${r.s}</span><span class="sub-total-amt">${fmt(r.tot)}</span></div>`;
    });
  }
  h += `</div>`;
  wrap.innerHTML = h;
}

function renderSubtabs(c) {
  const w = document.getElementById('panel-subtabs');
  if (!c.subs.filter(s=>s!=='').length) { w.innerHTML=''; return; }
  let h = `<span class="subtab ${aSub===null&&!managingSubs?'active':''}" onclick="setSub(null)">All</span>`;
  c.subs.filter(s=>s!=='').forEach(s => h+=`<span class="subtab ${aSub===s?'active':''}" onclick="setSub('${s}')">${s}</span>`);
  h += `<span class="subtab manage ${managingSubs?'active':''}" onclick="toggleManageSubs()">+ manage</span>`;
  w.innerHTML = h;
}

function toggleManageSubs() {
  managingSubs = !managingSubs;
  const c = CATS.find(x=>x.id===aId);
  renderSubtabs(c);
  renderManageSubs(managingSubs);
}

function renderManageSubs(show) {
  const wrap = document.getElementById('manage-subs-wrap');
  if (!show) { wrap.innerHTML=''; return; }
  const c = CATS.find(x=>x.id===aId);
  const named = c.subs.filter(s=>s!=='');
  let h = `<div class="manage-subs"><div class="manage-subs-title">manage subcategories</div>`;
  named.forEach((s,i) => h+=`<div class="sub-item"><span class="sub-item-name">${s}</span><button class="sub-del" onclick="deleteSub(${i})">remove</button></div>`);
  h += `<div class="add-sub-row"><input class="form-input" id="new-sub-inp" placeholder="new subcategory name" /><button class="btn-add" style="width:auto;padding:10px 14px;font-size:13px;" onclick="addSub()">+ add</button></div></div>`;
  wrap.innerHTML = h;
}

function addSub() {
  const inp = document.getElementById('new-sub-inp');
  const name = inp.value.trim();
  if (!name) return;
  const c = CATS.find(x=>x.id===aId);
  if (!c.subs.includes('')) c.subs.unshift('');
  c.subs.push(name);
  saveCats(); inp.value='';
  document.getElementById('inp-sub').innerHTML = c.subs.map(s=>`<option value="${s}">${s}</option>`).join('');
  document.getElementById('sub-select-row').style.display='block';
  renderSubtabs(c); renderManageSubs(true); renderSubTotals(c);
}

function deleteSub(idx) {
  const c = CATS.find(x=>x.id===aId);
  const named = c.subs.filter(s=>s!=='');
  named.splice(idx,1);
  c.subs = named.length ? ['',...named] : [];
  saveCats();
  if (c.subs.length) {
    document.getElementById('inp-sub').innerHTML = c.subs.map(s=>`<option value="${s}">${s}</option>`).join('');
  } else {
    document.getElementById('sub-select-row').style.display='none';
  }
  renderSubtabs(c); renderManageSubs(true); renderSubTotals(c);
}

function setSub(s) {
  aSub=s; managingSubs=false;
  renderSubtabs(CATS.find(c=>c.id===aId));
  renderManageSubs(false); renderEntries();
}

function renderEntries() {
  const mo=new Date().getMonth(), yr=new Date().getFullYear();
  let list = entries.filter(e => {
    if (e.category!==aId) return false;
    const d = new Date(e.date+'T12:00:00');
    return d.getMonth()===mo && d.getFullYear()===yr;
  });
  if (aSub) list = list.filter(e=>e.subcategory===aSub);
  // Sort chronologically
  list = list.slice().sort((a,b)=>new Date(a.date)-new Date(b.date));
  document.getElementById('panel-total').textContent = fmt(list.reduce((s,e)=>s+e.amount,0));
  if (!list.length) {
    document.getElementById('panel-entries').innerHTML='<div class="no-entries">no entries yet<br>add one below 🌿</div>';
    return;
  }
  let h='';
  list.forEach(e => {
    const ri = entries.indexOf(e);
    const d = new Date(e.date+'T12:00:00');
    const ds = (d.getMonth()+1)+'/'+d.getDate()+'/'+d.getFullYear().toString().slice(2);
    const subSpan = e.subcategory ? `<span class="entry-sub">· ${e.subcategory}</span>` : '';
    const noteHTML = e.note ? `<div class="entry-note-text">${e.note}</div>` : '';
    h+=`<div class="entry">
      <div class="entry-dot"></div>
      <div class="entry-info">
        <div class="entry-top">
          <div><span class="entry-date">${ds}</span>${subSpan}</div>
          <div style="display:flex;align-items:center;gap:4px;">
            <span class="entry-amt">${fmt(e.amount)}</span>
            <div class="entry-actions">
              <button class="entry-btn edit" onclick="editEntry(${ri})">✏️</button>
              <button class="entry-btn del" onclick="delEntry(${ri})">×</button>
            </div>
          </div>
        </div>
        ${noteHTML}
      </div>
    </div>`;
  });
  document.getElementById('panel-entries').innerHTML=h;
}

function editEntry(idx) {
  editingIdx=idx;
  const e=entries[idx];
  document.getElementById('inp-amt').value=e.amount;
  document.getElementById('inp-date').value=e.date;
  document.getElementById('inp-note').value=e.note||'';
  const c=CATS.find(x=>x.id===aId);
  if (c.subs.length && e.subcategory) document.getElementById('inp-sub').value=e.subcategory;
  document.getElementById('form-title').textContent='edit entry';
  document.getElementById('btn-submit').textContent='save changes';
  document.getElementById('btn-submit').className='btn-add editing';
  document.getElementById('btn-cancel').style.display='block';
  document.getElementById('preset-btn-wrap').innerHTML='';
  document.getElementById('add-form').scrollIntoView({behavior:'smooth'});
}

function cancelEdit() {
  editingIdx=null;
  document.getElementById('inp-amt').value='';
  document.getElementById('inp-note').value='';
  document.getElementById('inp-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('form-title').textContent='add entry';
  document.getElementById('btn-submit').textContent='+ add entry';
  document.getElementById('btn-submit').className='btn-add';
  document.getElementById('btn-cancel').style.display='none';
  const c=CATS.find(x=>x.id===aId);
  if (c.preset) document.getElementById('preset-btn-wrap').innerHTML=`<button class="btn-preset" onclick="addPreset()">+ add $${c.preset.toFixed(2)} (monthly)</button>`;
}

async function submitEntry() {
  const amt=parseFloat(document.getElementById('inp-amt').value);
  if (!amt||amt<=0) { document.getElementById('inp-amt').focus(); return; }
  const note=document.getElementById('inp-note').value.trim();
  const date=document.getElementById('inp-date').value||new Date().toISOString().split('T')[0];
  const c=CATS.find(x=>x.id===aId);
  const sub=c.subs.length ? document.getElementById('inp-sub').value : '';
  if (editingIdx!==null) {
    await syncDelete(entries[editingIdx]);
    entries.splice(editingIdx,1);
    editingIdx=null;
  }
  const entry={date, category:aId, subcategory:sub, amount:amt, note};
  entries.push(entry);
  localStorage.setItem('ll_entries',JSON.stringify(entries));
  await syncAdd(entry);
  document.getElementById('inp-amt').value='';
  document.getElementById('inp-note').value='';
  document.getElementById('inp-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('form-title').textContent='add entry';
  document.getElementById('btn-submit').textContent='+ add entry';
  document.getElementById('btn-submit').className='btn-add';
  document.getElementById('btn-cancel').style.display='none';
  const c2=CATS.find(x=>x.id===aId);
  if (c2.preset) document.getElementById('preset-btn-wrap').innerHTML=`<button class="btn-preset" onclick="addPreset()">+ add $${c2.preset.toFixed(2)} (monthly)</button>`;
  renderSubTotals(c2); renderEntries(); renderTiles();
}

async function addPreset() {
  const c=CATS.find(x=>x.id===aId);
  const entry={date:new Date().toISOString().split('T')[0], category:aId, subcategory:'', amount:c.preset, note:''};
  entries.push(entry);
  localStorage.setItem('ll_entries',JSON.stringify(entries));
  await syncAdd(entry);
  renderSubTotals(c); renderEntries(); renderTiles();
}

async function delEntry(idx) {
  await syncDelete(entries[idx]);
  entries.splice(idx,1);
  localStorage.setItem('ll_entries',JSON.stringify(entries));
  const c=CATS.find(x=>x.id===aId);
  renderSubTotals(c); renderEntries(); renderTiles();
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  aId=null; editingIdx=null;
}
function handlePanelClick(e) { if(e.target===document.getElementById('panel')) closePanel(); }

loadCats();
loadEntries();
</script>
</body>
</html>
